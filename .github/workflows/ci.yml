name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (xcodebuild)
        run: |
          xcodebuild \
            -project SSHConfigurator.xcodeproj \
            -scheme SSHConfigurator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Run tests (swift test)
        run: swift test

      - name: Run tests (xcodebuild — SSHConfigCore + app unit tests)
        run: |
          xcodebuild \
            -project SSHConfigurator.xcodeproj \
            -scheme SSHConfigurator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            test \
            -only-testing:SSHConfigCoreTests \
            -only-testing:SSHConfiguratorTests

  ui-smoke:
    runs-on: macos-14
    # UI tests run in a separate job/step from the unit-test build above: they need
    # a real WindowServer session (present on GitHub's macOS runners) plus macOS
    # "Developer Mode" enabled, and a genuine (ad-hoc is fine) code signature —
    # unlike unit tests, `testmanagerd` refuses to attach to an unsigned or
    # Developer-Mode-less test runner and silently kills it before it connects.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Developer Mode (required for XCUITest automation)
        run: sudo /usr/sbin/DevToolsSecurity -enable

      - name: Run UI smoke test (ad-hoc signed)
        run: |
          xcodebuild \
            -project SSHConfigurator.xcodeproj \
            -scheme SSHConfigurator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            test \
            -only-testing:SSHConfiguratorUITests
